<template>
  <article class="slds-grid slds-gutters_small slds-align-middle slds-var-p-around_small slds-var-m-vertical_x-small">
    
    <div class="slds-col slds-size_1-of-5 slds-align-middle">
      <template lwc:if={imageUrl}>
        <img src={imageUrl} alt="School Logo" style="max-width: 100%; max-height: 100px; object-fit: contain; border-radius: 4px;" />
      </template>
    </div>

    <div class="slds-col slds-size_4-of-5">
      <p class="slds-text-heading_small" title="Program Name">
        <a href={program.hed__Account__r.Website} target="_blank">{program.hed__Account__r.Name}</a>
      </p>
      
      <p class="slds-truncate" title="School">
        <a href={program.hed__Account__r.Parent.Parent.Website} target="_blank">
          {program.hed__Account__r.Parent.Parent.Name}
        </a>
      </p>
      
      <p class="slds-truncate" title="Duration">{formattedDates}</p>
      
      <template lwc:if={hasGPA}>
        <p class="slds-truncate" title="GPA">GPA: {formattedGPA}</p>
      </template>
    </div>

  </article>
</template>
