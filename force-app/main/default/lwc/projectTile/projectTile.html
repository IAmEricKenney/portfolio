<template>
  <article class="slds-card slds-card_boundary slds-var-m-bottom_small">
    <div class="slds-card__header slds-grid">
      <header class="slds-media slds-media_center slds-has-flexi-truncate">
        <div class="slds-media__body slds-truncate">
          <h3 class="slds-card__header-title slds-truncate" title={project.Name}>
            {project.Name}
          </h3>
          <template lwc:if={formattedDates}>
            <p class="slds-text-body_small slds-text-color_weak">{formattedDates}</p>
          </template>
        </div>
      </header>
    </div>
    
    <div class="slds-card__body slds-var-p-horizontal_medium">
      <lightning-formatted-rich-text 
          value={project.Description__c}>
      </lightning-formatted-rich-text>
    </div>
  </article>
</template>
