<template>
  <lightning-card title="Degrees and Certificates" icon-name="standard:education">
    <template lwc:if={hasPrograms}>
      <div class="slds-var-p-around_small">
        <template for:each={programs.data} for:item="program">
          <div key={program.Id} class="slds-var-m-vertical_x-small">
            <c-program-enrollment-tile program={program}></c-program-enrollment-tile>
          </div>
        </template>
      </div>
    </template>
    <template lwc:elseif={hasError}>
      <p class="slds-text-color_error slds-var-p-around_small">
        Error loading education records: {programs.error.body.message}
      </p>
    </template>
    <template lwc:else>
      <p class="slds-text-body_small slds-var-p-around_small">No education records found.</p>
    </template>
  </lightning-card>
</template>
